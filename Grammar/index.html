<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文法復習 - English Learning</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Hiragino Kaku Gothic Pro", "Yu Gothic", "Meiryo", sans-serif;
            background-color: #f5f5f5;
            color: #333;
            padding: 20px;
        }
        .page-container {
            max-width: 900px;
            margin: 0 auto;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.2s;
        }
        .back-link:hover { color: #2e7d32; }
        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.95em;
            margin-bottom: 2rem;
        }
        .grammar-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .grammar-card {
            background: white;
            border-radius: 10px;
            padding: 22px 24px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-left: 5px solid var(--card-color);
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
        }
        .grammar-card:hover {
            transform: translateX(6px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.13);
        }
        .grammar-title {
            font-size: 1.1em;
            font-weight: bold;
            color: var(--card-color);
        }
        .grammar-desc {
            font-size: 0.85em;
            color: #999;
            margin-top: 5px;
        }
    </style>
<script>document.addEventListener("gesturestart",e=>e.preventDefault());document.addEventListener("touchstart",e=>{if(e.touches.length>1)e.preventDefault()},{passive:false});</script>
</head>
<body>
    <div class="page-container">
        <a href="../index.html" class="back-link">&larr; トップに戻る</a>
        <h1>文法復習</h1>
        <p class="subtitle">Grammar Review</p>
        <div class="grammar-list">
            <a href="it-is-adj-that.html" class="grammar-card" style="--card-color: #2563eb;">
                <div class="grammar-title">It is 形容詞 that S V</div>
                <div class="grammar-desc">形容詞パターン完全ガイド</div>
            </a>
            <a href="that_clause_verbs_v2.html" class="grammar-card" style="--card-color: #059669;">
                <div class="grammar-title">that節をとる伝達動詞</div>
                <div class="grammar-desc">発信内容による分類</div>
            </a>
            <a href="noun_of.html" class="grammar-card" style="--card-color: #ea580c;">
                <div class="grammar-title">a NOUN of ~</div>
                <div class="grammar-desc">名詞 of 表現リスト</div>
            </a>
            <a href="no_more_idioms.html" class="grammar-card" style="--card-color: #7c3aed;">
                <div class="grammar-title">no more のイディオム的用法</div>
                <div class="grammar-desc">構文別完全ガイド</div>
            </a>
        </div>
    </div>
</body>
</html>
